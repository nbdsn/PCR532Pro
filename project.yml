name: PCR532Pro
options:
  bundleIdPrefix: com.pcr532
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

targets:
  PCR532Pro:
    type: application
    platform: iOS
    sources:
      - path: Sources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.pcr532.pro
      INFOPLIST_FILE: Info.plist
      DEVELOPMENT_TEAM: ""
      TARGETED_DEVICE_FAMILY: "1"
      IPHONEOS_DEPLOYMENT_TARGET: "16.0"
      SWIFT_VERSION: "5.9"
      SWIFT_OBJC_BRIDGING_HEADER: ""
      ENABLE_BITCODE: NO