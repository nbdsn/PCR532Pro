name: Build PCR532 Pro

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: 安装 XcodeGen
        run: brew install xcodegen

      - name: 生成 Xcode 项目
        run: xcodegen

      - name: 列出可用的 Scheme
        run: xcodebuild -list -project PCR532Pro.xcodeproj

      - name: 编译（无签名）
        run: |
          xcodebuild \
            -project PCR532Pro.xcodeproj \
            -scheme PCR532Pro \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath Build \
            build 2>&1 | tee build.log
          echo "EXIT_CODE=$?" >> $GITHUB_ENV

      - name: 显示错误日志（如果编译失败）
        if: failure()
        run: |
          echo "=== Build log (last 100 lines) ==="
          tail -100 build.log
          echo "=== Xcode version ==="
          xcodebuild -version

      - name: 打包 .ipa（仅当 .app 存在时）
        run: |
          APP_PATH=$(find Build -name "PCR532Pro.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "Found .app at: $APP_PATH"
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r PCR532Pro.ipa Payload/
            rm -rf Payload
            echo "IPA built successfully"
          else
            echo "WARNING: .app not found, IPA will not be created"
            exit 1
          fi

      - name: 上传 .ipa
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PCR532Pro-ipa
          path: PCR532Pro.ipa
          compression-level: 0

      - name: 上传编译日志（失败时）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log