name: Build PCR532 Pro

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: 诊断环境
        run: |
          echo "Xcode: $(xcodebuild -version 2>&1)"
          echo "Swift: $(swift --version 2>&1)"
          echo "SDKs: $(xcodebuild -showsdks 2>&1)"

      - name: 安装 XcodeGen
        run: HOMEBREW_NO_AUTO_UPDATE=1 brew install xcodegen 2>&1

      - name: 生成项目
        run: |
          rm -rf PCR532Pro.xcodeproj 2>/dev/null
          xcodegen 2>&1
          ls -la PCR532Pro.xcodeproj/ 2>&1
          ls -la PCR532Pro.xcodeproj/xcshareddata/xcschemes/ 2>&1 || echo "No xcschemes dir"

      - name: 编译
        run: |
          xcodebuild \
            -project PCR532Pro.xcodeproj \
            -scheme PCR532Pro \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath Build \
            build 2>&1 > build.log; EXIT_CODE=$?; cat build.log; exit $EXIT_CODE

      - name: 上传编译日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: 打包 .ipa
        if: success()
        run: |
          APP=$(find Build -name "PCR532Pro.app" -type d | head -1)
          if [ -n "$APP" ]; then
            mkdir -p Payload && cp -r "$APP" Payload/ && zip -r PCR532Pro.ipa Payload/
          else
            echo "No .app found!"
            exit 1
          fi

      - name: 上传 .ipa
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PCR532Pro-ipa
          path: PCR532Pro.ipa