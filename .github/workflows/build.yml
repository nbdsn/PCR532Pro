name: Build PCR532 Pro

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: 安装 XcodeGen
        run: brew install xcodegen

      - name: 生成 Xcode 项目
        run: xcodegen

      - name: 检查 Scheme
        run: |
          echo "=== Xcode version ==="
          xcodebuild -version
          echo "=== Available schemes ==="
          xcodebuild -list -project PCR532Pro.xcodeproj 2>&1

      - name: 编译
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          xcodebuild \
            -project PCR532Pro.xcodeproj \
            -scheme PCR532Pro \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath Build \
            build 2>&1 | tee build.log
          echo "status=$?" >> $GITHUB_OUTPUT

      - name: 显示错误日志
        if: steps.build.outputs.status != '0' || failure()
        run: |
          echo "=== Build log (last 50 lines) ==="
          tail -50 build.log
          echo "=== Full log available as artifact ==="

      - name: 上传编译日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: 打包 .ipa
        if: steps.build.outputs.status == '0'
        run: |
          APP_PATH=$(find Build -name "PCR532Pro.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "Found .app at: $APP_PATH"
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r PCR532Pro.ipa Payload/
            rm -rf Payload
          else
            echo "ERROR: .app not found"
            exit 1
          fi

      - name: 上传 .ipa
        if: steps.build.outputs.status == '0'
        uses: actions/upload-artifact@v4
        with:
          name: PCR532Pro-ipa
          path: PCR532Pro.ipa
          compression-level: 0